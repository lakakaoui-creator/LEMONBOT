<svg viewBox="0 0 500 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Large lemon holding frozen olive banana product -->
  
  <!-- Lemon body -->
  <ellipse cx="150" cy="220" rx="90" ry="120" fill="#FFD700" stroke="#FFA500" stroke-width="3"/>
  
  <!-- Lemon top point -->
  <path d="M 150 80 Q 135 130 150 160 Q 165 130 150 80" fill="#FFD700" stroke="#FFA500" stroke-width="3"/>
  
  <!-- Eyes - cool expression -->
  <circle cx="120" cy="200" r="10" fill="#000"/>
  <circle cx="180" cy="200" r="10" fill="#000"/>
  <circle cx="122" cy="198" r="4" fill="#ffffff"/>
  <circle cx="182" cy="198" r="4" fill="#ffffff"/>
  
  <!-- Cool eyebrows -->
  <path d="M 105 180 Q 120 175 135 180" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 165 180 Q 180 175 195 180" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Confident smile -->
  <path d="M 125 260 Q 150 285 175 260" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Left arm relaxed -->
  <rect x="50" y="210" width="45" height="15" fill="#FFD700" stroke="#FFA500" stroke-width="2" rx="7"/>
  <circle cx="50" cy="217" r="12" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
  
  <!-- Right arm extended holding product -->
  <rect x="225" y="210" width="80" height="15" fill="#FFD700" stroke="#FFA500" stroke-width="2" rx="7"/>
  <circle cx="300" cy="217" r="14" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
  
  <!-- FROZEN OLIVE BANANA product - icy plaquette -->
  <g transform="translate(320, 100)">
    <!-- Main product body with ice blue -->
    <rect x="0" y="0" width="130" height="200" fill="#4DD0E1" stroke="#0097A7" stroke-width="4" rx="8"/>
    
    <!-- Frosted glass effect -->
    <rect x="8" y="8" width="114" height="184" fill="#B3E5FC" stroke="#4DD0E1" stroke-width="2" rx="6" opacity="0.8"/>
    
    <!-- Ice crystal shine -->
    <ellipse cx="40" cy="35" rx="20" ry="30" fill="#ffffff" opacity="0.5"/>
    
    <!-- Olive (green sphere) in center -->
    <circle cx="65" cy="50" r="20" fill="#228B22" stroke="#1a6b1a" stroke-width="2"/>
    <circle cx="65" cy="50" r="18" fill="#32CD32" opacity="0.7"/>
    <circle cx="60" cy="45" r="5" fill="#ffffff" opacity="0.5"/>
    
    <!-- Text -->
    <text x="65" y="105" font-size="22" font-weight="bold" fill="#00695C" text-anchor="middle" font-family="Arial">FROZEN</text>
    <text x="65" y="135" font-size="22" font-weight="bold" fill="#00695C" text-anchor="middle" font-family="Arial">OLIVE</text>
    <text x="65" y="165" font-size="22" font-weight="bold" fill="#00695C" text-anchor="middle" font-family="Arial">BANANA</text>
  </g>
  
  <!-- Legs -->
  <rect x="138" y="330" width="12" height="90" fill="#FFD700" stroke="#FFA500" stroke-width="2" rx="6"/>
  <rect x="160" y="330" width="12" height="90" fill="#FFD700" stroke="#FFA500" stroke-width="2" rx="6"/>
  
  <!-- Shoes -->
  <ellipse cx="144" cy="425" rx="14" ry="10" fill="#333" stroke="#000" stroke-width="1"/>
  <ellipse cx="166" cy="425" rx="14" ry="10" fill="#333" stroke="#000" stroke-width="1"/>
  
  <!-- Leaf decoration -->
  <ellipse cx="220" cy="90" rx="30" ry="50" fill="#32CD32" stroke="#228B22" stroke-width="2.5" transform="rotate(-40 220 90)"/>
  <path d="M 220 60 Q 235 90 220 120" stroke="#228B22" stroke-width="2" fill="none"/>
</svg>