<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Lemon holding yellow product -->
  <!-- Lemon body -->
  <ellipse cx="100" cy="150" rx="50" ry="65" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
  
  <!-- Lemon top -->
  <path d="M 100 70 Q 90 90 100 110 Q 110 90 100 70" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="135" r="5" fill="#000"/>
  <circle cx="115" cy="135" r="5" fill="#000"/>
  
  <!-- Smile -->
  <path d="M 90 160 Q 100 170 110 160" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Right arm pointing to product -->
  <rect x="140" y="145" width="40" height="8" fill="#FFD700" stroke="#FFA500" stroke-width="1" rx="4"/>
  <circle cx="175" cy="149" r="8" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
  
  <!-- Yellow product tablet/plaquette -->
  <g transform="translate(210, 100)">
    <!-- Main rectangle -->
    <rect x="0" y="0" width="70" height="100" fill="#FFD700" stroke="#FFA500" stroke-width="3" rx="5"/>
    
    <!-- Inner glow -->
    <rect x="5" y="5" width="60" height="90" fill="#FFFF99" stroke="#FFD700" stroke-width="1" rx="3" opacity="0.6"/>
    
    <!-- Text overlay -->
    <text x="35" y="45" font-size="20" font-weight="bold" fill="#FFA500" text-anchor="middle" font-family="Arial">JAUNE</text>
    <text x="35" y="70" font-size="16" font-weight="bold" fill="#FFA500" text-anchor="middle" font-family="Arial">MOUSSEUX</text>
    
    <!-- Shine effect -->
    <ellipse cx="20" cy="20" rx="12" ry="15" fill="#FFFF99" opacity="0.5"/>
  </g>
  
  <!-- Legs -->
  <rect x="90" y="210" width="8" height="50" fill="#FFD700" stroke="#FFA500" stroke-width="1" rx="4"/>
  <rect x="102" y="210" width="8" height="50" fill="#FFD700" stroke="#FFA500" stroke-width="1" rx="4"/>
  
  <!-- Shoes -->
  <ellipse cx="94" cy="265" rx="8" ry="6" fill="#333"/>
  <ellipse cx="106" cy="265" rx="8" ry="6" fill="#333"/>
</svg>